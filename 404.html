<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Level3Support</title>
    <link rel="icon" type="image/x-icon" href="images/L3S_ICON.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header Navbar */
        .app-header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-logo {
            height: 40px;
            width: auto;
        }

        /* Main Section: split layout on desktop */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            gap: 60px;
        }

        .illustration-section {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-illustration {
            max-width: 100%;
            max-height: 480px;
            height: auto;
            border-radius: 12px;
            animation: hoverEffect 4s ease-in-out infinite;
        }

        @keyframes hoverEffect {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .content-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .error-message {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 480px;
        }

        .actions-container {
            display: flex;
            gap: 16px;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: #f8fafc;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
            transform: translateY(-2px);
            border-color: #cbd5e1;
        }

        /* Footer */
        .app-footer {
            padding: 24px 40px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .powered-by {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .partner-logo {
            height: 20px;
            width: auto;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
                gap: 40px;
                text-align: center;
                padding: 40px 24px;
            }

            .content-section {
                align-items: center;
                text-align: center;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-illustration {
                max-height: 360px;
            }

            .actions-container {
                justify-content: center;
            }

            .app-header {
                justify-content: center;
                padding: 20px;
            }

            .app-footer {
                flex-direction: column;
                gap: 12px;
                text-align: center;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Top Header -->
    <header class="app-header">
        <a href="index.html">
            <img src="images/L3S_HEADER_LOGO.png" alt="Level3Support Logo" class="brand-logo">
        </a>
    </header>

    <!-- Main Content Section -->
    <main class="main-container">
        <div class="illustration-section">
            <img src="images/NEW 404.webp" alt="404 Page Not Found" class="error-illustration">
        </div>
        
        <div class="content-section">
            <h1 class="error-title">Oops! Page under repair</h1>
            <p class="error-message">
                The page you are looking for has wandered off, or is currently being assembled by our robot. Let's get you back to work.
            </p>
            
            <div class="actions-container">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-th-large"></i> Go to Dashboard
                </a>
                <button onclick="window.history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div>&copy; 2026 Level3Support. All rights reserved.</div>
        <div class="powered-by">
            <span>Powered by</span>
            <img src="images/APROVERO_LOGO.png" alt="aprovero" class="partner-logo">
        </div>
    </footer>
</body>
</html>
