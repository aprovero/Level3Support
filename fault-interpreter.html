<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Module/Fan Fault Code Interpreter — Level3Support</title>
  <link rel="stylesheet" href="css/shared-styles.css" />
  <link rel="stylesheet" href="css/fault-interpreter.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="page-container">
    <a href="index.html" class="btn-back-link"><i class="fas fa-arrow-left"></i> Back to ToolHub</a>
    
    <!-- Header Card -->
    <div class="tool-header-card">
        <div class="tool-header-flex" style="border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 16px;">
            <div class="logo">
                <img src="images/L3S_HEADER_LOGO.png" alt="Level3Support" style="height: 50px; width: auto;">
            </div>
        </div>
        <div style="margin-top: 1rem;">
            <h1 style="text-align: left; margin: 0 0 8px 0; font-size: 1.8rem; font-family: 'Outfit', sans-serif;">Module/Fan Fault Code Interpreter</h1>
            <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 16px;">
                Decode binary status words and hexadecimal codes for cooling fan or power module diagnostic systems.
            </p>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span style="font-size: 0.75rem; font-weight: 600; color: #0369a1; background: #e0f2fe; padding: 4px 8px; border-radius: 4px; text-transform: uppercase;">⚡ DIAGNOSTICS</span>
                <span style="font-size: 0.75rem; font-weight: 600; color: #15803d; background: #dcfce7; padding: 4px 8px; border-radius: 4px; text-transform: uppercase;">ACTIVE</span>
            </div>
        </div>
    </div>

    <div class="card-panel-wrapper"><div class="card-panel-wrapper"><div class="upload-section">
      <!-- Inverter Series -->
      <fieldset class="radio-group">
        <legend>Inverter Series</legend>
        <div class="radio-options">
          <label class="radio-option">
            <input type="radio" name="inverter" value="sg3125" checked /> SG3125 Series
          </label>
          <label class="radio-option">
            <input type="radio" name="inverter" value="onePlusX" /> 1+X Series
          </label>
        </div>
      </fieldset>

      <!-- Fault Section -->
      <fieldset class="radio-group">
        <legend>Fault Section</legend>
        <div class="radio-options" id="section-options">
          <!-- dynamically filled -->
        </div>
      </fieldset>

      <!-- Fault Code Input -->
      <label for="fault-code">Enter Fault Code</label>
      <div class="input-wrapper">
        <div class="input-with-prefix">
          <input type="text" id="fault-code" placeholder="e.g. 0A1B or 123" />
        </div>
      </div>

      <div id="message-container" style="margin-top: 16px;"></div>
    </div></div></div>

    <div id="binary-output" class="form-group card-panel-wrapper" style="display: none;"></div>
    <div id="fault-result" class="form-group card-panel-wrapper" style="display: none;"></div>

    <footer class="footer">
        <div class="footer-text">
            <div class="footer-copyright">© 2026 LEVEL3SUPPORT. ALL RIGHTS RESERVED.</div>
        </div>
        <div class="footer-logo">
            <span style="font-style: italic; opacity: 0.85; font-size: 0.85rem; color: var(--text-light);">Powered by</span>
            <img src="images/APROVERO_LOGO.png" alt="aprovero" style="height: 32px; width: auto; opacity: 0.85; transition: all 0.2s ease; cursor: pointer;" onmouseover="this.style.opacity='1';" onmouseout="this.style.opacity='0.85';">
        </div>
    </footer>
  </div>

  <script src="js/fault-interpreter.js"></script>
    </div>
    </div>
</body>
</html>
