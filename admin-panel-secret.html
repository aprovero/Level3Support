<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolHub Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/core.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 2rem; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #475569; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .btn { background: #2563eb; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn:hover { background: #1d4ed8; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; font-weight: 600; color: #475569; }
        .hidden { display: none; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .logout-btn { background: #ef4444; width: auto; padding: 0.5rem 1rem; }
        .logout-btn:hover { background: #dc2626; }
        /* Toggles */
        .toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="auth-section" class="auth-container">
        <h2><i class="fas fa-lock"></i> Admin Login</h2>
        <p style="color: #64748b; margin-bottom: 2rem;">Log in to manage ToolHub tags</p>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div id="login-error" style="color: #ef4444; margin-bottom: 1rem; display: none;">Invalid credentials</div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-section" class="admin-container hidden">
        <div class="header-flex">
            <h2><i class="fas fa-tools"></i> Manage Tool Registry</h2>
            <button id="logout-btn" class="btn logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        
        <p style="color: #64748b; margin-bottom: 1rem;">Changes made here instantly sync to all field users.</p>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tool Name</th>
                    <th>Category</th>
                    <th style="text-align: center;">Featured (Essential)</th>
                    <th style="text-align: center;">NEW Addition</th>
                </tr>
            </thead>
            <tbody id="tools-tbody">
                <!-- Injected via JS -->
            </tbody>
        </table>
    </div>

    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/admin-panel.js"></script>
</body>
</html>
