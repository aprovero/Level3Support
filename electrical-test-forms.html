<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electrical Test Forms — Level3Support</title>
  <meta name="description" content="Field-ready electrical test forms for insulation resistance (megger), transformer commissioning, grounding continuity, CT/PT ratio, and relay settings." />
  <link rel="stylesheet" href="css/shared-styles.css?v=24" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    .etf-container {
      max-width: 1020px;
      margin: 20px auto;
      background: var(--background-light);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-md);
      padding: 24px;
    }
    .etf-header {
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 16px;
      margin-bottom: 20px;
      display: flex;
      
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .etf-header .logo img {
      height: 50px;
      width: auto;
    }
    .etf-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--background-dark);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .input-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .dynamic-table-wrapper {
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      overflow-x: auto;
    }
    .dynamic-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .dynamic-table th {
      background: var(--background-dark);
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-color);
      font-size: 0.75rem;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .dynamic-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    .dynamic-table tr:last-child td { border-bottom: none; }
    .dynamic-table input, .dynamic-table select, .dynamic-table textarea {
      margin-bottom: 0;
      padding: 5px 8px;
      height: 32px;
      font-size: 0.82rem;
      min-width: 80px;
    }
    .dynamic-table textarea { height: 52px; resize: vertical; }
    .dynamic-table select { min-width: 90px; }
    .btn-row {
      display: flex;
      justify-content: space-between;
      
      margin-top: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-action {
      width: auto;
      min-height: unset;
      padding: 8px 16px;
      font-size: 0.84rem;
      margin-top: 0;
    }
    .status-badge-inline {
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.78rem;
      text-transform: uppercase;
      display: inline-block;
    }
    .status-pass { background: #dcfce7; color: #15803d; }
    .status-warn { background: #fef3c7; color: #92400e; }
    .status-fail { background: #fee2e2; color: #b91c1c; }
    .status-review { background: #ede9fe; color: #6d28d9; }
    .status-na { background: #f1f5f9; color: #64748b; }
    .safety-warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-left: 4px solid #f97316;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      
    }
    .safety-warning i { color: #ea580c; font-size: 1.1rem; margin-top: 2px; flex-shrink: 0; }
    .safety-warning-title { font-weight: 700; font-size: 0.9rem; color: #9a3412; margin-bottom: 4px; }
    .safety-warning p { font-size: 0.85rem; color: #7c2d12; margin: 0; line-height: 1.5; }
    .summary-card {
      background: var(--background-dark);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      padding: 16px 20px;
      margin-top: 20px;
    }
    .summary-card .result-header {
      display: flex;
      justify-content: space-between;
      
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .summary-item {
      background: var(--background-light);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .summary-item-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
    .summary-item-value { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .inspection-row {
      display: grid;
      grid-template-columns: 1fr 140px 1fr;
      gap: 8px;
      
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.85rem;
    }
    .inspection-row:last-child { border-bottom: none; }
    .inspection-label { font-size: 0.85rem; color: var(--text-primary); }
    .cb-row {
      display: flex;
      
      gap: 8px;
      padding: 4px 0;
      font-size: 0.85rem;
    }
    .cb-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .section-optional-badge {
      display: inline-block;
      font-size: 0.68rem;
      background: #e0f2fe;
      color: #0369a1;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 600;
    }
    .form-section-control {
      display: flex;
      
      gap: 8px;
      margin-left: auto;
    }
    .form-section-control select {
      font-size: 0.78rem;
      padding: 2px 6px;
      height: 28px;
      width: auto;
      min-width: 110px;
    }
    .section-h3 {
      display: flex;
      
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 0;
      margin-bottom: 14px;
      font-family: 'Outfit', sans-serif;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }
    .sig-placeholder {
      border: 1px dashed var(--border-color);
      border-radius: 6px;
      height: 60px;
      display: flex;
      
      justify-content: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--background-dark);
    }
    @media (max-width: 640px) {
      .input-row { grid-template-columns: 1fr; }
      .inspection-row { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }
    @media print {
      body { background: white !important; color: black !important; }
      .etf-container { box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
      .back-link, .btn-row, .btn-add-row, td button, .print-hide, .safety-warning { display: none !important; }
      .dynamic-table input, .dynamic-table select, .dynamic-table textarea {
        border: none !important; background: transparent !important;
        pointer-events: none !important; padding: 0 !important;
      }
      .dynamic-table th { background: #eee !important; color: black !important; }
      .form-section { border: 1px solid #ccc !important; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="etf-container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to ToolHub</a>

    <div class="etf-header">
      <div class="logo">
        <img src="images/L3S_HEADER_LOGO.png" alt="Level3Support" />
      </div>
      <div class="etf-tag">⚡ ELECTRICAL TEST FORM</div>
    </div>

    <h1 id="form-title" style="text-align:left; margin:0 0 4px 0; font-size:1.75rem;"></h1>
    <p id="form-subtitle" style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:20px;"></p>

    <!-- Form content injected here -->
    <div id="form-root"></div>

    <!-- Action bar -->
    <div class="btn-row print-hide">
      <div class="btn-group">
        <button type="button" id="save-draft-btn" class="button-secondary btn-action"><i class="fas fa-save"></i> Save Draft</button>
        <button type="button" id="export-csv-btn" class="button-secondary btn-action"><i class="fas fa-file-csv"></i> Export CSV</button>
        <button type="button" id="export-json-btn" class="button-secondary btn-action"><i class="fas fa-file-code"></i> Export JSON</button>
      </div>
      <div class="btn-group">
        <button type="button" id="print-btn" class="button-secondary btn-action" onclick="window.print()"><i class="fas fa-print"></i> Print Form</button>
        <button type="button" id="reset-btn" class="button-secondary btn-action" style="background:#fee2e2;color:#b91c1c;border-color:#fecaca;"><i class="fas fa-undo"></i> Clear Form</button>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-text">
        <div class="footer-copyright">© 2026 LEVEL3SUPPORT. ALL RIGHTS RESERVED.</div>
      </div>
      <div class="footer-logo">
        <span style="font-style:italic;opacity:0.85;font-size:0.85rem;color:var(--text-light);">Powered by</span>
        <img src="images/APROVERO_LOGO.png" alt="aprovero" style="height:32px;width:auto;opacity:0.85;transition:all 0.2s;cursor:pointer;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
      </div>
    </footer>
  </div>

  <script src="js/common.js"></script>
  <script src="js/tool-resources.js"></script>
  <script src="js/insulation-resistance-form.js"></script>
  <script src="js/transformer-test-form.js"></script>
  <script src="js/form-components.js"></script>

  <script>
    // --- Routing ---
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }
    const tool = getQueryParam('tool');

    const toolMeta = {
      'insulation-resistance': {
        title: 'Insulation Resistance Test Form',
        subtitle: 'Field form for recording insulation resistance (Megger) test results for PV circuits, feeders, cables, transformers, motors, and switchgear.',
        builder: 'insulationResistanceFormBuilder',
        pageSlug: 'electrical-test-forms.html?tool=insulation-resistance'
      },
      'transformer-test': {
        title: 'Transformer Test Results Form',
        subtitle: 'Comprehensive commissioning and maintenance test form for power transformers — TTR, winding resistance, insulation resistance, visual inspection, and functional checks.',
        builder: 'transformerTestFormBuilder',
        pageSlug: 'electrical-test-forms.html?tool=transformer-test'
      },
      'grounding-continuity': {
        title: 'Grounding Continuity Test Form',
        subtitle: 'Field form for recording grounding and bonding continuity test results.',
        builder: 'groundingContinuityFormBuilder',
        pageSlug: 'electrical-test-forms.html?tool=grounding-continuity'
      },
      'ct-pt-ratio': {
        title: 'CT/PT Ratio Verification Tool',
        subtitle: 'Instrument transformer ratio and polarity verification form.',
        builder: 'ctPtRatioFormBuilder',
        pageSlug: 'electrical-test-forms.html?tool=ct-pt-ratio'
      },
      'relay-checklist': {
        title: 'Relay Settings Checklist',
        subtitle: 'Protection relay commissioning settings verification checklist.',
        builder: 'relayChecklistFormBuilder',
        pageSlug: 'electrical-test-forms.html?tool=relay-checklist'
      }
    };

    const meta = toolMeta[tool];
    if (meta) {
      document.title = meta.title + ' — Level3Support';
      document.getElementById('form-title').textContent = meta.title;
      document.getElementById('form-subtitle').textContent = meta.subtitle;
    } else {
      document.getElementById('form-title').textContent = 'Electrical Test Form';
      document.getElementById('form-subtitle').textContent = 'Select a tool from the ToolHub.';
    }

    // Build form
    if (meta && typeof window[meta.builder] === 'function') {
      window[meta.builder]();
    } else if (!meta) {
      document.getElementById('form-root').innerHTML = '<p style="color:var(--text-secondary);">No tool selected. Return to <a href="index.html">ToolHub</a> and choose an electrical test form.</p>';
    } else {
      document.getElementById('form-root').innerHTML = '<p style="color:var(--text-secondary);">Form builder not available for this tool yet.</p>';
    }

    // --- Draft Save / Load ---
    function saveDraft() {
      if (!tool) return;
      const data = {};
      document.querySelectorAll('#form-root input, #form-root select, #form-root textarea').forEach(el => {
        if (el.id) {
          if (el.type === 'checkbox') data[el.id] = el.checked;
          else data[el.id] = el.value;
        }
      });
      localStorage.setItem('draft_etf_' + tool, JSON.stringify(data));
    }
    function loadDraft() {
      if (!tool) return;
      const saved = localStorage.getItem('draft_etf_' + tool);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        Object.entries(data).forEach(([id, value]) => {
          const el = document.getElementById(id);
          if (!el) return;
          if (el.type === 'checkbox') el.checked = value;
          else el.value = value;
        });
      } catch (e) { console.warn('Draft load error', e); }
    }
    // Load draft after form is built
    setTimeout(loadDraft, 100);
    // Auto-save on input
    document.getElementById('form-root').addEventListener('input', saveDraft);
    document.getElementById('form-root').addEventListener('change', saveDraft);

    // --- Button Handlers ---
    document.getElementById('save-draft-btn').addEventListener('click', () => {
      saveDraft();
      const btn = document.getElementById('save-draft-btn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
      btn.style.background = '#dcfce7'; btn.style.color = '#15803d';
      setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 1800);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('Clear all form data? This cannot be undone.')) return;
      document.querySelectorAll('#form-root input, #form-root select, #form-root textarea').forEach(el => {
        if (el.type === 'checkbox') el.checked = false;
        else if (el.tagName === 'SELECT') el.selectedIndex = 0;
        else el.value = '';
      });
      localStorage.removeItem('draft_etf_' + tool);
    });

    document.getElementById('export-csv-btn').addEventListener('click', () => {
      if (typeof exportFormToCSV === 'function') exportFormToCSV(tool || 'form');
    });

    document.getElementById('export-json-btn').addEventListener('click', () => {
      if (typeof exportFormToJSON === 'function') exportFormToJSON(tool || 'form');
    });

    // Resources card
    if (meta && meta.pageSlug) {
      if (typeof _injectToolResourcesCard === 'function') _injectToolResourcesCard(meta.pageSlug);
    }
  </script>
</body>
</html>
